apisix:
  node_listen: 9080
  enable_admin: true

deployment:
  role: data_plane
  role_data_plane:
    config_provider: yaml
  admin:
    admin_key:
      - name: admin
        key: 742138hjfahud3429
        role: admin
    allow_admin:
      - 0.0.0.0/0  # Please set it to the subnet address you obtained.
      # If not set, by default all IP access is allowed.
    admin_listen:
      port: 9180
  etcd:
    host:
      - http://etcd:2379
    prefix: /apisix
    timeout: 30

plugin_attr:
  jwt-auth:
    enable: true

#END
