apisix:
  node_listen: 9080
  enable_admin: true

deployment:
  role: traditional
  config_provider: etcd
  admin:
    admin_key:
      - name: admin
        key: 742138hjfahud3429
        role: admin
    allow_admin:
      - 0.0.0.0/0  # Please set it to the subnet address you obtained.
      # If not set, by default all IP access is allowed.
    admin_listen:
      port: 9180
  etcd:
    host:
      - http://etcd:2379
    prefix: /apisix
    timeout: 30

routes:
  -
    uri: /api/v1/functions
    upstream:
      type: roundrobin
      nodes:
        "127.0.0.1:3000": 1
    methods: ["POST", "GET", "DELETE"]
    plugins:
      jwt-auth: {}

  -
    uri: /api/v1/users/
    upstream:
      type: roundrobin
      nodes:
        "127.0.0.1:3000": 1
    methods: ["GET", "DELETE"]
    plugins:
      jwt-auth: {}


plugin_attr:
  jwt-auth:
    enable: true

#END